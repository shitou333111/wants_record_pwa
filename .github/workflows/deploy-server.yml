name: Deploy To Server

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: deploy-server-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-server:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && contains(github.event.head_commit.message, '[release]'))
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Server root deployment; no GitHub Pages sub-path prefix.
          BASE_URL: /

      - name: Upload dist to server tmp path
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: dist/*
          target: /tmp/wants_record_pwa-deploy
          overwrite: true
          strip_components: 1

      - name: Atomic deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            TARGET_DIR="${{ secrets.SSH_TARGET_DIR }}"
            RELEASES_DIR="${TARGET_DIR}/.releases"
            RELEASE_DIR="${RELEASES_DIR}/release-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"

            mkdir -p "$RELEASE_DIR"
            cp -a /tmp/wants_record_pwa-deploy/. "$RELEASE_DIR/"
            ln -sfn "$RELEASE_DIR" "${TARGET_DIR}/current"

            # If Nginx/Apache points to current/ this is enough.
            # Keep only latest 5 releases.
            ls -1dt "${RELEASES_DIR}"/release-* 2>/dev/null | tail -n +6 | xargs -r rm -rf
