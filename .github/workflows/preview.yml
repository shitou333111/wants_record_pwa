name: Deploy Preview

run: |
          # 关键点：如果是预览版，基础路径必须包含子目录
          # 注意：如果是 github.io 访问，路径是 /仓库名/子目录/
          # 如果是自定义域名访问，路径是 /子目录/
          export VITE_BASE='/wants_record_pwa/previews/latest/'
          npm run build

on:
  push:
    branches: [ main ]  # 只要 push 到 main 就触发
  pull_request:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: BASE_URL=/wants_record_pwa/previews/latest/ npm run build

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist
          target-folder: ${{ github.event_name == 'pull_request' && format('previews/pr-{0}', github.event.number) || 'previews/latest' }}
          clean: false
          commit-message: 'Deploy preview for PR #${{ github.event.number }}'